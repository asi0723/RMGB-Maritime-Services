{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RMGB Maritime Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'maritime/css/style.css' %}"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <img src="{% static 'maritime/images/logo.jpg' %}" alt="RMGB Logo"/>
        <span>RMGB Maritime Services</span>
      </div>
      <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'contact' %}">Contact Us</a>
        <div class="theme-toggle" id="themeToggle">
          <button class="theme-btn" id="dayBtn" title="Day Mode">&#9728;</button>
          <button class="theme-btn" id="nightBtn" title="Night Mode">&#9790;</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <main>
    {% block content %}
    {% endblock %}
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>&copy; 2025 RMGB Maritime Services. All rights reserved.</p>
    <p>Established 2015 &middot; Philippines</p>
  </footer>

  <script>
    const dayBtn = document.getElementById('dayBtn');
    const nightBtn = document.getElementById('nightBtn');

    function setDay() {
      document.body.classList.remove('dark-mode');
      dayBtn.classList.add('active');
      nightBtn.classList.remove('active');
      localStorage.setItem('theme', 'light');
    }

    function setNight() {
      document.body.classList.add('dark-mode');
      nightBtn.classList.add('active');
      dayBtn.classList.remove('active');
      localStorage.setItem('theme', 'dark');
    }

    if (localStorage.getItem('theme') === 'dark') {
      setNight();
    } else {
      setDay();
    }

    dayBtn.addEventListener('click', setDay);
    nightBtn.addEventListener('click', setNight);
  </script>

</body>
</html>
